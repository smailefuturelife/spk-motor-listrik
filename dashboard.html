<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Icon -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">

  <style>
    #sidebar {
      width: 220px;
      transition: 0.3s;
    }

    #sidebar.hide {
      margin-left: -220px;
    }

    #content {
      transition: 0.3s;
      width: 100%;
    }
  </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container-fluid">
    <button class="btn btn-dark" onclick="toggleSidebar()">
      <i class="bi bi-list"></i>
    </button>
    <span class="navbar-brand">SPK Motor Listrik</span>
  </div>
</nav>

<div class="d-flex">

  <!-- Sidebar -->
  <div id="sidebar" class="bg-dark text-white p-3 vh-100">
    <h5>Menu</h5>
    <hr>

    <button onclick="loadPage('kriteria.html')" class="btn btn-dark w-100 mb-2">Kriteria</button>
    <button onclick="loadPage('alternatif.html')" class="btn btn-dark w-100 mb-2">Alternatif</button>
    <button onclick="loadPage('penilaian.html')" class="btn btn-dark w-100 mb-2">Penilaian</button>
    <button onclick="loadPage('hasil.html')" class="btn btn-dark w-100 mb-2">Hasil</button>

    <button onclick="logout()" class="btn btn-danger mt-3 w-100">Logout</button>
  </div>

  <!-- Content -->
  <div id="content" class="flex-grow-1">
    <iframe id="frame" src="pages/kriteria.html"
      style="width:100%; height:calc(100vh - 56px); border:none;">
    </iframe>
  </div>

</div>

<script>
function loadPage(page) {
  document.getElementById("frame").src = "pages/" + page;
}

function logout() {
  localStorage.removeItem("user");
  window.location.href = "login.html";
}

function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("hide");
}
</script>

</body>
</html>
