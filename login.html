<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Login</title>

  <!-- WAJIB BIAR RESPONSIVE -->
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Icon -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">

  <style>
    body {
      background: linear-gradient(135deg, #1f1f1f, #343a40);
      height: 100vh;
    }

    .card {
      border-radius: 15px;
    }

    .form-control {
      border-radius: 10px;
    }

    .btn {
      border-radius: 10px;
    }
  </style>
</head>

<body class="d-flex justify-content-center align-items-center">

<div class="card p-4 shadow" style="width: 320px;">
  
  <h4 class="text-center mb-3">
    <i class="bi bi-lock"></i> Login SPK
  </h4>

  <!-- USER -->
  <input id="user" class="form-control mb-2" placeholder="Username">

  <!-- PASSWORD -->
  <div class="input-group mb-3">
    <input id="pass" type="password" class="form-control" placeholder="Password">
    <button class="btn btn-outline-secondary" onclick="togglePass()">
      <i id="iconPass" class="bi bi-eye"></i>
    </button>
  </div>

  <!-- BUTTON -->
  <button id="btnLogin" onclick="login()" class="btn btn-primary w-100">
    <i class="bi bi-box-arrow-in-right"></i> Login
  </button>

</div>

<!-- SCRIPT -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase.js"></script>
<script src="assets/js/auth.js"></script>

<script>
function togglePass() {
  let pass = document.getElementById("pass");
  let icon = document.getElementById("iconPass");

  if (pass.type === "password") {
    pass.type = "text";
    icon.classList.replace("bi-eye", "bi-eye-slash");
  } else {
    pass.type = "password";
    icon.classList.replace("bi-eye-slash", "bi-eye");
  }
}
</script>

</body>
</html>
