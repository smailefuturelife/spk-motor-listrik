<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Hasil</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
</head>

<body class="bg-light p-4">

<div class="container">

  <!-- CARD TABEL -->
  <div class="card shadow p-4 mb-4">
    <h3 class="mb-3">
      <i class="bi bi-bar-chart"></i> Hasil Perhitungan SAW
    </h3>

    <button onclick="hitung()" class="btn btn-success mb-3">
      <i class="bi bi-calculator"></i> Hitung
    </button>

    <table class="table table-hover text-center align-middle">
      <thead class="table-dark">
        <tr>
          <th>Ranking</th>
          <th>Laptop</th>
          <th>Skor</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="hasil"></tbody>
    </table>
  </div>

  <!-- 🔥 DONUT DI LUAR CARD -->
  <div class="card shadow p-3 text-center">
    <h5 class="mb-3">Grafik Distribusi Skor</h5>

    <div class="d-flex justify-content-center">
      <div style="width: 280px;">
        <canvas id="chartHasil"></canvas>
      </div>
    </div>
  </div>

</div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/supabase.js"></script>
<script src="../assets/js/hasil.js"></script>

</body>
</html>
