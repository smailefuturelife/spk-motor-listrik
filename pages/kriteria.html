<!DOCTYPE html>
<html>
<head>
  <title>Kriteria</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-4">

<h2>Data Kriteria</h2>

<div class="card p-3 mb-3">
  <input id="nama" class="form-control mb-2" placeholder="Nama Kriteria">
  <input id="bobot" class="form-control mb-2" placeholder="Bobot">

  <select id="tipe" class="form-control mb-2">
    <option value="benefit">Benefit</option>
    <option value="cost">Cost</option>
  </select>

  <button onclick="tambah()" class="btn btn-success">Tambah</button>
</div>

<table class="table table-striped">
  <thead class="table-dark">
    <tr>
      <th>Nama</th>
      <th>Bobot</th>
      <th>Tipe</th>
    </tr>
  </thead>
  <tbody id="data"></tbody>
</table>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="../assets/js/supabase.js"></script>
<script src="../assets/js/kriteria.js"></script>

</body>
</html>
