<!DOCTYPE html>
<html>
<head>
  <title>Kriteria</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Icon -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
</head>

<body class="p-4 bg-light">

<div class="container">

  <h2 class="mb-3">Data Kriteria</h2>

  <!-- Form -->
  <div class="card p-3 mb-3 shadow">
    <input id="nama" class="form-control mb-2" placeholder="Nama Kriteria">
    <input id="bobot" type="number" step="0.01" class="form-control mb-2" placeholder="Bobot">

    <select id="tipe" class="form-select mb-2">
      <option value="benefit">Benefit</option>
      <option value="cost">Cost</option>
    </select>

    <button onclick="tambah()" class="btn btn-success">
      <i class="bi bi-plus-circle"></i> Tambah
    </button>
  </div>

  <!-- Table -->
  <div class="table-responsive">
    <table class="table table-striped text-center align-middle">
      <thead class="table-dark">
        <tr>
          <th>No</th>
          <th>Nama</th>
          <th>Bobot</th>
          <th>Tipe</th>
          <th>Aksi</th>
        </tr>
      </thead>
      <tbody id="data"></tbody>
    </table>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="../assets/js/supabase.js"></script>
<script src="../assets/js/kriteria.js"></script>

</body>
</html>
