<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kriteria</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">

  <h3>Data Kriteria</h3>

  <input id="nama" class="form-control mb-2" placeholder="Nama">
  <input id="bobot" class="form-control mb-2" type="number">
  
  <select id="tipe" class="form-control mb-2">
    <option value="benefit">Benefit</option>
    <option value="cost">Cost</option>
  </select>

  <button onclick="tambah()" class="btn btn-success mb-3">Tambah</button>

  <table class="table table-bordered">
    <thead>
      <tr>
        <th>No</th>
        <th>Nama</th>
        <th>Bobot</th>
        <th>Tipe</th>
        <th>Aksi</th>
      </tr>
    </thead>
    <tbody id="data"></tbody>
  </table>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="kriteria.js"></script>

</body>
</html>
