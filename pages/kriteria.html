<!DOCTYPE html>
<html>
<head>
  <title>Kriteria</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Icon -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
</head>

<body class="bg-light p-3">

<div class="container">

  <!-- FORM -->
  <div class="card shadow p-3 mb-3">
    <h4 class="mb-3">Data Kriteria</h4>

    <input id="nama" class="form-control mb-2" placeholder="Nama Kriteria">
    <input id="bobot" type="number" step="0.01" class="form-control mb-2" placeholder="Bobot (contoh: 0.25)">

    <select id="tipe" class="form-select mb-3">
      <option value="benefit">Benefit</option>
      <option value="cost">Cost</option>
    </select>

    <button onclick="tambah()" class="btn btn-success w-100">
      <i class="bi bi-plus-circle"></i> Tambah
    </button>
  </div>

  <!-- TABLE -->
  <div class="card shadow p-3">
    <div class="table-responsive">
      <table class="table table-striped text-center align-middle">
        <thead class="table-dark">
          <tr>
            <th>No</th>
            <th>Nama</th>
            <th>Bobot</th>
            <th>Tipe</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody id="data"></tbody>
      </table>
    </div>
  </div>

</div>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="../assets/js/supabase.js"></script>

<!-- Script -->
<script src="../assets/js/kriteria.js"></script>

</body>
</html>
