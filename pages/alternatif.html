<!DOCTYPE html>
<html>
<head>
  <title>Alternatif</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Icon -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
</head>

<body class="bg-light p-4">

<div class="container">

  <div class="card shadow p-4">
    <h3 class="mb-3">
      <i class="bi bi-lightning-charge"></i> Data Laptop 
    </h3>

    <!-- Form -->
    <div class="row mb-3">
      <div class="col-md-8">
        <input id="nama" class="form-control" placeholder="Nama Laptop">
      </div>
      <div class="col-md-4">
        <button onclick="tambah()" class="btn btn-primary w-100">
          <i class="bi bi-plus-circle"></i> Tambah
        </button>
      </div>
    </div>

    <!-- Alert -->
    <div id="alert"></div>

    <!-- Table -->
    <table class="table table-hover text-center align-middle">
      <thead class="table-dark">
        <tr>
          <th>No</th>
          <th>Nama Laptop</th>
        </tr>
      </thead>
      <tbody id="data"></tbody>
    </table>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="../assets/js/supabase.js"></script>
<script src="../assets/js/alternatif.js"></script>

</body>
</html>
